<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="csssss.css">
    <title>Contact</title>
</head>
<body>
    <section id="contact" class="contact">
    <div class="container_contact">
      <h2 class="contact-title">Vous avez un <span class="colorini">projet en tête ?  </span><br>  N'hesitez pas a me <span class="colorini">contacter.</span> </h2>
      <form action="mailto:wensoalseille@gmail.com" method="post" enctype="text/plain" class="contact_form">
        <div class="row">
          <label>
            Votre prénom
            <input type="text" name="Prenom" placeholder="Wenso" required>
          </label>

          <label>
            Votre nom
            <input type="text" name="nom" placeholder="Alseille" required>
          </label>
        </div>

        <label>
          Votre sujet
          <input type="text" name="subject" placeholder="Développement d'un site vitrine" required>
        </label>

        <label>
          Votre message
          <textarea name="message" rows="7" placeholder="Écrivez votre message ici..." required></textarea>
        </label>

        <div class="center">
          <button style="width: 20%;" class="boutton" type="submit">Envoyer</button>
        </div>
      </form>
    </div>
</section>
</body>
</html>
